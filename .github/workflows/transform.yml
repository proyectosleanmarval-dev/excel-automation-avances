name: Transformar Estado Obra

permissions:
  contents: write

on:
  push:
    paths:
      - 'data/original/estadoObra.xlsx'

jobs:
  transform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Ejecutar script de transformación
        run: |
          python scripts/transform.py

      - name: Verificar archivos generados
        run: |
          echo "Contenido de data/transformed:"
          ls -la data/transformed/

      - name: Copiar CSV a docs para publicación
        run: |
          mkdir -p docs
          cp data/transformed/estadoObra_filtrado.csv docs/
          echo "Contenido de docs:"
          ls -la docs/

      - name: Commit archivos transformados
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/transformed/estadoObra_filtrado.xlsx
          git add data/transformed/estadoObra_filtrado.csv
          git add docs/estadoObra_filtrado.csv
          git commit -m "Actualiza archivos filtrados automáticamente" || echo "Sin cambios"
          git push
